<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SharePods Audio Room</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(to right,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:350px;
text-align:center;
}

h1{
margin-bottom:20px;
}

input{
width:80%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
color:white;
}

#joinBtn{
background:#4facfe;
}

#shareBtn{
background:#00b894;
}

button:hover{
opacity:0.9;
}

#status{
margin-top:10px;
font-weight:bold;
color:green;
}

#users{
margin-top:15px;
border:1px solid #eee;
border-radius:8px;
padding:10px;
max-height:150px;
overflow-y:auto;
}

.user{
background:#f1f1f1;
padding:8px;
border-radius:6px;
margin-bottom:5px;
}

</style>
</head>

<body>

<div class="container">

<h1>SharePods</h1>

<input id="room" placeholder="Room ID">

<br>

<button id="joinBtn" onclick="joinRoom()">Join Room</button>
<button id="shareBtn" onclick="shareAudio()">Share Device Audio</button>

<div id="status"></div>

<h3>Connected Users</h3>
<div id="users"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
